# fly.toml - Fly.io configuration for CAPA CAFE

app = "capa-cafe"
primary_region = "sin"  # Singapore - closest to Myanmar

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
